<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahal · Agent Response Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');

  :root {
    --green-dark: #284d3a;
    --green-bright: #00ff99;
    --green-pale: #e3fde2;
    --white: #ffffff;
    --ink: #1a1a1a;
    --muted: #7a8a80;
    --rule: #d8edd8;
    --red: #c8401a;
    --amber: #b8892a;
    --card: #f7fef7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--green-pale);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--green-dark);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--green-bright);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--green-bright);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--green-dark);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--green-pale);
    letter-spacing: 0.5px;
  }
  .topbar-title span {
    color: var(--green-bright);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .notion-link {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--green-pale);
    text-decoration: none;
    padding: 0.35rem 0.75rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .notion-link:hover {
    background: rgba(0,255,153,0.12);
    border-color: var(--green-bright);
    color: var(--green-bright);
  }
  .notion-link svg { width: 13px; height: 13px; opacity: 0.8; }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green-bright);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-label {
    font-size: 0.68rem;
    color: rgba(227,253,226,0.6);
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }



  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-height: calc(100vh - 88px);
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rule);
    background: var(--white);
  }
  .panel-header {
    padding: 1rem 1.2rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .char-count {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  #customer-input {
    flex: 1;
    padding: 1rem 1.2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    line-height: 1.7;
    border: none;
    outline: none;
    resize: none;
    color: var(--ink);
    background: var(--white);
  }
  #customer-input::placeholder { color: #b0c4b0; }

  .left-actions {
    padding: 0.8rem 1.2rem;
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  #submit-btn {
    background: var(--green-dark);
    color: var(--green-bright);
    border: none;
    padding: 0.6rem 1.2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  #submit-btn:hover { background: #1a3d2b; }
  #submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  #submit-btn svg { width: 13px; height: 13px; }

  #clear-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--muted);
    padding: 0.6rem 0.9rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: var(--green-dark); color: var(--ink); }

  /* category badges */
  .category-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    padding: 0 1.2rem 0.8rem;
  }
  .cat-tag {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    border: 1px solid var(--rule);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .cat-tag:hover, .cat-tag.active {
    background: var(--green-dark);
    color: var(--green-bright);
    border-color: var(--green-dark);
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    background: var(--card);
    overflow: hidden;
  }
  .right-header {
    padding: 1rem 1.2rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
  }

  #output-area {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  /* empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
  }
  .empty-icon {
    width: 40px; height: 40px;
    border: 2px dashed var(--rule);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
  }
  .empty-state p { font-size: 0.82rem; line-height: 1.5; }

  /* chat-style loading */
  #chat-feed {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .chat-bubble {
    display: inline-block;
    background: var(--green-pale);
    border: 1px solid var(--rule);
    border-radius: 12px 12px 12px 2px;
    padding: 0.4rem 0.85rem;
    font-size: 0.78rem;
    color: var(--ink);
    animation: fadeUp 0.18s ease;
    align-self: flex-start;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSE CARDS ── */
  .intent-bar {
    background: var(--green-dark);
    color: var(--green-pale);
    border-radius: 4px;
    padding: 0.6rem 0.9rem;
    font-size: 0.78rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .intent-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(227,253,226,0.55);
    font-family: 'DM Mono', monospace;
  }
  .intent-value {
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--green-bright);
  }
  .urgency-badge {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 2px;
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }
  .urgency-high { background: var(--red); color: white; }
  .urgency-medium { background: var(--amber); color: white; }
  .urgency-low { background: rgba(227,253,226,0.3); color: rgba(227,253,226,0.8); }

  .response-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 6px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .response-card:hover { box-shadow: 0 2px 12px rgba(40,77,58,0.08); }

  .card-head {
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafffe;
  }
  .card-type {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .card-type.primary { color: #00a86b; }
  .card-tag {
    font-size: 0.58rem;
    font-weight: 600;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace;
  }
  .tag-canned { background: #e8f4e8; color: #2d7a2d; }
  .tag-generated { background: #e8eef8; color: #2d4a8a; }

  .card-body {
    padding: 0.85rem 0.9rem;
    font-size: 0.86rem;
    line-height: 1.7;
    color: var(--ink);
  }
  .card-body .placeholder {
    background: #fff8e0;
    border: 1px dashed #e0c060;
    border-radius: 2px;
    padding: 0 0.3rem;
    color: #8a6a00;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
  }

  .card-actions {
    padding: 0.5rem 0.9rem;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 0.5rem;
    background: #fafffe;
  }
  .copy-btn {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.3rem 0.7rem;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--rule);
    background: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .copy-btn:hover {
    background: var(--green-dark);
    color: var(--green-bright);
    border-color: var(--green-dark);
  }
  .copy-btn.copied {
    background: #00a86b;
    color: white;
    border-color: #00a86b;
  }
  .copy-btn svg { width: 11px; height: 11px; }

  .notes-card {
    background: #fffbf0;
    border: 1px solid #f0dfa0;
    border-radius: 6px;
    padding: 0.7rem 0.9rem;
  }
  .notes-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #8a6a00;
    font-family: 'DM Mono', monospace;
    margin-bottom: 0.4rem;
  }
  .notes-text {
    font-size: 0.8rem;
    line-height: 1.6;
    color: #5a4a00;
  }

  .error-card {
    background: #fff5f3;
    border: 1px solid #f5c6c0;
    border-radius: 6px;
    padding: 0.8rem 0.9rem;
    font-size: 0.82rem;
    color: var(--red);
    line-height: 1.5;
  }

  /* scrollbar */
  #output-area::-webkit-scrollbar { width: 4px; }
  #output-area::-webkit-scrollbar-track { background: transparent; }
  #output-area::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; max-height: none; }
    .left-panel { min-height: 280px; }
  }
</style>
</head>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">ر</div>

    <div class="status-dot"></div>
    <span class="status-label">live</span>
  </div>

<div class="main">

      <input id="agent-name" type="text" placeholder="Your name" autocomplete="name" style="flex:1;padding:0.3rem 0.6rem;font-family:'Syne',sans-serif;font-size:0.8rem;border:1px solid var(--rule);border-radius:3px;outline:none;color:var(--ink);background:var(--card);">

    <textarea id="customer-input" placeholder="Paste the customer's message here…&#10;&#10;e.g. 'Hi I need to change my flight from Baghdad to Dubai, it's tomorrow and I'm panicking'"></textarea>
    <div class="category-tags" id="category-tags">
      <span class="cat-tag" onclick="toggleTag(this, 'Flight booking')">✈ Flight</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Hotel booking')">🏨 Hotel</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Cancellation')">✕ Cancel</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Flight change')">↔ Change</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Refund')">↩ Refund</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Visa / documents')">📄 Visa</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Complaint')">⚠ Complaint</span>
      <span class="cat-tag" onclick="toggleTag(this, 'Payment')">💳 Payment</span>
    </div>
    <div class="left-actions">
      <button id="submit-btn" onclick="runAgent()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Suggest responses
      </button>
      <button id="clear-btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- RIGHT: suggestions -->
  <div class="right-panel">
    <div class="right-header">
      <span class="panel-label">Suggested Responses</span>
      <span class="char-count" id="response-meta"></span>
    </div>
    <div id="output-area">
      <div class="empty-state">
        <div class="empty-icon">↗</div>
        <p>Paste a customer message and hit<br><strong>Suggest responses</strong></p>
      </div>
    </div>
  </div>

</div>

- "You're welcome. We're here if you need anything else. Goodbye."

FAILED BOOKING - PRICE INCREASE (Rahal covers it):
- "We sincerely apologize for the delay and any inconvenience you experienced. During the booking process, the ticket price increased from the original rate. However, at Rahal, our motto is 'Traveler First.' To stay true to that promise, we have covered the entire price difference from our own company budget. Your ticket is now fully confirmed. We wish you a wonderful and safe trip!"
`;

  let activeTag = null;
  let currentSession = null; // holds intent, urgency, message for logging

  function toggleTag(el, value) {
    document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
    if (activeTag === value) {
      activeTag = null;
    } else {
      el.classList.add('active');
      activeTag = value;
    }
  }

  document.getElementById('customer-input').addEventListener('input', function() {
    const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    document.getElementById('char-count').textContent = words + (words === 1 ? ' word' : ' words');
  });

  function clearAll() {
    document.getElementById('customer-input').value = '';
    document.getElementById('char-count').textContent = '0 words';
    document.getElementById('response-meta').textContent = '';
    document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
    activeTag = null;
    document.getElementById('output-area').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">↗</div>
        <p>Paste a customer message and hit<br><strong>Suggest responses</strong></p>
      </div>`;
  }

  async function runAgent() {
    const text = document.getElementById('customer-input').value.trim();
    const output = document.getElementById('output-area');
    const btn = document.getElementById('submit-btn');

    if (!text) return;

    if (!PROXY_URL || PROXY_URL === 'PASTE_YOUR_WORKER_URL_HERE') {
      output.innerHTML = '<div class="error-card"><strong>Proxy not configured.</strong><br>Follow the setup guide to deploy the Cloudflare Worker, then paste the Worker URL into this file.</div>';
      return;
    }

    btn.disabled = true;

    // Chat-style loading
    const steps = [
      { d: 0,    t: 'Reading customer message…' },
      { d: 500,  t: 'Identifying intent and urgency…' },
      { d: 1100, t: 'Matching canned responses…' },
      { d: 1800, t: 'Tailoring suggestions…' },
    ];
    output.innerHTML = '<div id="chat-feed"></div>';
    const feed = document.getElementById('chat-feed');
    steps.forEach(({ d, t }) => {
      setTimeout(() => {
        if (!document.getElementById('chat-feed')) return;
        const b = document.createElement('div');
        b.className = 'chat-bubble';
        b.textContent = t;
        feed.appendChild(b);
      }, d);
    });

    const categoryHint = activeTag ? `The agent has indicated this is about: ${activeTag}.` : '';

    const systemPrompt = `You are an expert customer service assistant for Rahal (رحّال), Iraq's travel platform. You help live chat agents respond quickly and correctly.

You have access to Rahal's official canned responses library:

${CANNED}

YOUR JOB:
Given a customer's chat message, return a JSON object with:
1. The detected intent (short, clear label)
2. Urgency level: "high", "medium", or "low"
3. 2-3 suggested response options in English, ordered best-first
4. Any important agent notes (e.g. verify booking first, check refund policy, irreversible warning)

RESPONSE RULES:
- Prefer canned responses when they fit — adapt them to the specific situation
- Fill in [placeholders] with context clues from the customer message where possible, otherwise keep the [placeholder] format
- If no canned response fits, write a natural Rahal-brand response
- Keep responses warm, direct, professional — like a trusted friend who works in travel
- Never use: "journey" (metaphorical), "seamlessly", "dive into", "game-changer", "hidden gems"
- Never be falsely reassuring about things like refunds or irreversible changes
- If payment or a change is irreversible, always flag this clearly
- British English spelling

${categoryHint}

Respond ONLY with this JSON, no markdown, no preamble:
{
  "intent": "short intent label",
  "urgency": "high|medium|low",
  "responses": [
    {
      "type": "Primary response",
      "source": "canned|generated",
      "text": "The full response text, with [placeholders] where needed"
    },
    {
      "type": "Alternative",
      "source": "canned|generated",
      "text": "..."
    }
  ],
  "agent_notes": "Any important notes for the agent — warnings, steps to take, policies to check. Empty string if none."
}`;

    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1200,
          system: systemPrompt,
          messages: [{ role: 'user', content: text }]
        })
      });

      const data = await res.json();
      const raw = data.content?.find(b => b.type === 'text')?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);
      renderResponse(result);

    } catch (err) {
      output.innerHTML = `<div class="error-card">
        <strong>Could not reach the proxy.</strong><br>
        ${err.message || 'Network error'}<br><br>
        <span style="font-size:0.75rem;opacity:0.8;">Check that your Cloudflare Worker is deployed and the URL in this file is correct.</span>
      </div>`;
    }

    btn.disabled = false;
  }

  function renderResponse(r) {
    const output = document.getElementById('output-area');
    const urgencyClass = r.urgency === 'high' ? 'urgency-high' : r.urgency === 'medium' ? 'urgency-medium' : 'urgency-low';

    let html = `
      <div class="intent-bar">
        <div>
          <div class="intent-label">Detected Intent</div>
          <div class="intent-value">${r.intent}</div>
        </div>
        <span class="urgency-badge ${urgencyClass}">${r.urgency.toUpperCase()} URGENCY</span>
      </div>
    `;

    (r.responses || []).forEach((resp, i) => {
      const tagClass = resp.source === 'canned' ? 'tag-canned' : 'tag-generated';
      const tagLabel = resp.source === 'canned' ? 'Canned' : 'Generated';
      const typeClass = i === 0 ? 'primary' : '';

      // Highlight placeholders
      const formatted = resp.text.replace(/\[([^\]]+)\]/g,
        '<span class="placeholder">[$1]</span>');

      html += `
        <div class="response-card">
          <div class="card-head">
            <span class="card-type ${typeClass}">${resp.type}</span>
            <span class="card-tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="card-body">${formatted}</div>
          <div class="card-actions">
            <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(resp.text)})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>`;
    });

    if (r.agent_notes) {
      html += `
        <div class="notes-card">
          <div class="notes-label">⚠ Agent Notes</div>
          <div class="notes-text">${r.agent_notes}</div>
        </div>`;
    }

    document.getElementById('response-meta').textContent =
      `${(r.responses || []).length} suggestions · ${r.urgency} urgency`;

    // Store for logging when agent copies a response
    currentSession = {
      intent: r.intent,
      urgency: r.urgency,
      customerMessage: document.getElementById('customer-input').value.trim(),
      categoryTag: activeTag || '—',
    };

    output.innerHTML = html;
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.textContent = '✓ Copied';

      // Log to Google Sheets
      logToSheet(text);

      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 1800);
    });
  }

  async function logToSheet(responseCopied) {
    if (!SHEETS_URL || SHEETS_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') return;
    if (!currentSession) return;

    const agentName = document.getElementById('agent-name').value.trim() || 'Unknown';

    const payload = {
      timestamp: new Date().toISOString(),
      agentName,
      categoryTag: currentSession.categoryTag,
      customerMessage: currentSession.customerMessage,
      detectedIntent: currentSession.intent,
      urgency: currentSession.urgency,
      responseCopied,
    };

    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      // Silent fail — don't interrupt the agent's workflow
      console.warn('Sheet log failed:', e);
    }
  }

  // Submit on Ctrl+Enter
  document.getElementById('customer-input').addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runAgent();
  });
</script>
</body>
</html>
